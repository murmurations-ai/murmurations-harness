<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Murmuration Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #0d1117; color: #c9d1d9; padding: 20px; max-width: 1200px; margin: 0 auto; }
  h1 { color: #58a6ff; margin-bottom: 4px; font-size: 1.4rem; }
  h2 { color: #c9d1d9; margin: 16px 0 8px; font-size: 1rem; border-bottom: 1px solid #30363d; padding-bottom: 4px; }
  .meta { color: #8b949e; margin-bottom: 16px; font-size: 0.85rem; }
  .overview { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .overview .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; text-align: center; }
  .overview .stat-card .num { font-size: 1.6rem; font-weight: 700; color: #58a6ff; }
  .overview .stat-card .lbl { font-size: 0.75rem; color: #8b949e; margin-top: 2px; }
  .groups { margin-bottom: 8px; }
  .group-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 6px; }
  .group-card h3 { color: #58a6ff; font-size: 1rem; margin-bottom: 6px; }
  .group-stats { display: flex; gap: 20px; font-size: 0.85rem; color: #8b949e; margin-bottom: 8px; }
  .group-stats span { color: #c9d1d9; font-weight: 600; }
  .group-members { display: flex; flex-wrap: wrap; gap: 6px; }
  .member-tag { background: #21262d; border: 1px solid #30363d; border-radius: 4px; padding: 2px 8px; font-size: 0.75rem; }
  .member-tag.active { border-color: #3fb950; color: #3fb950; }
  .member-tag.idle { border-color: #d29922; color: #d29922; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; }
  .card h3 { color: #58a6ff; font-size: 0.9rem; margin-bottom: 6px; }
  .stat { display: flex; justify-content: space-between; margin: 3px 0; font-size: 0.8rem; }
  .stat .label { color: #8b949e; }
  .stat .value { color: #c9d1d9; font-weight: 600; }
  .state-idle { color: #3fb950; }
  .state-running { color: #d29922; }
  .state-failed { color: #f85149; }
  .bar { height: 4px; background: #21262d; border-radius: 2px; margin-top: 4px; }
  .bar-fill { height: 100%; border-radius: 2px; background: #58a6ff; }
  .bar-fill.warn { background: #f85149; }
  .events { margin-top: 16px; max-height: 150px; overflow-y: auto; font-size: 0.75rem; color: #8b949e; }
  .events div { padding: 2px 0; border-bottom: 1px solid #21262d; }
  #dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #3fb950; margin-right: 6px; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar button, .toolbar select { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 0.8rem; }
  .toolbar button:hover { background: #30363d; }
  .toolbar button.primary { background: #238636; border-color: #238636; }
  .toolbar button.primary:hover { background: #2ea043; }
  .toolbar button.danger { background: #da3633; border-color: #da3633; }
  .toolbar button.danger:hover { background: #f85149; }
  .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
  .modal.show { display: flex; }
  .modal-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; width: 90%; max-width: 500px; }
  .modal-box h3 { color: #58a6ff; margin-bottom: 12px; }
  .modal-box input, .modal-box textarea, .modal-box select { width: 100%; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 8px; margin-bottom: 10px; font-family: inherit; }
  .modal-box textarea { min-height: 80px; resize: vertical; }
  .modal-box .actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>
<h1><span id="dot"></span><span id="title">Murmuration Dashboard</span></h1>
<div class="meta" id="meta">Loading...</div>

<div class="toolbar">
  <button class="primary" onclick="showDirective()">Send Directive</button>
  <select id="group-select" onchange="if(this.value)showGroupWake(this.value)"><option value="">Convene Group...</option></select>
  <button class="danger" onclick="sendCmd('stop',{})">Stop Daemon</button>
</div>

<div class="overview" id="overview"></div>

<div class="modal" id="directive-modal">
  <div class="modal-box">
    <h3>Send Directive</h3>
    <select id="dir-scope"><option value="--all">All Agents</option></select>
    <textarea id="dir-message" placeholder="Your directive message..."></textarea>
    <div class="actions">
      <button onclick="closeModal('directive-modal')">Cancel</button>
      <button class="primary" onclick="sendDirective()">Send</button>
    </div>
  </div>
</div>

<div class="modal" id="group-modal">
  <div class="modal-box">
    <h3>Convene Group: <span id="gw-group"></span></h3>
    <select id="gw-kind"><option value="operational">Operational</option><option value="governance">Governance</option><option value="retrospective">Retrospective</option></select>
    <textarea id="gw-directive" placeholder="Optional directive for the meeting..."></textarea>
    <div class="actions">
      <button onclick="closeModal('group-modal')">Cancel</button>
      <button class="primary" onclick="sendGroupWake()">Convene</button>
    </div>
  </div>
</div>

<h2 id="gov-title">Governance</h2>
<div class="groups" id="governance"></div>

<h2>Recent Meetings</h2>
<div class="groups" id="meetings"></div>

<h2>Groups</h2>
<div class="groups" id="groups"></div>

<h2 style="display:flex;justify-content:space-between;align-items:center">Agents
  <span style="display:flex;gap:6px;font-size:0.75rem;font-weight:400">
    <select id="agent-sort" onchange="sessionStorage.setItem('agentSort',this.value);refresh()" style="background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:2px 6px;font-size:0.75rem">
      <option value="name">Sort: Name</option>
      <option value="wakes">Sort: Wakes</option>
      <option value="artifacts">Sort: Artifacts</option>
      <option value="idle">Sort: Idle %</option>
      <option value="failures">Sort: Failures</option>
    </select>
    <select id="agent-filter" onchange="sessionStorage.setItem('agentFilter',this.value);refresh()" style="background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:2px 6px;font-size:0.75rem">
      <option value="all">Filter: All</option>
      <option value="idle">Idle</option>
      <option value="running">Running</option>
      <option value="failed">Failed</option>
    </select>
  </span>
</h2>
<div class="grid" id="agents"></div>

<h2 style="display:flex;justify-content:space-between;align-items:center">Daemon Log
  <span id="log-level-btns" style="display:flex;gap:4px;font-size:0.7rem;font-weight:400">
    <button onclick="setLogFilter('debug')" data-level="debug" style="background:#21262d;color:#8b949e;border:1px solid #30363d;border-radius:4px;padding:1px 6px;cursor:pointer;font-size:0.7rem">debug</button>
    <button onclick="setLogFilter('info')" data-level="info" style="background:#30363d;color:#58a6ff;border:1px solid #30363d;border-radius:4px;padding:1px 6px;cursor:pointer;font-size:0.7rem">info</button>
    <button onclick="setLogFilter('warn')" data-level="warn" style="background:#21262d;color:#8b949e;border:1px solid #30363d;border-radius:4px;padding:1px 6px;cursor:pointer;font-size:0.7rem">warn</button>
    <button onclick="setLogFilter('error')" data-level="error" style="background:#21262d;color:#8b949e;border:1px solid #30363d;border-radius:4px;padding:1px 6px;cursor:pointer;font-size:0.7rem">error</button>
  </span>
</h2>
<div id="log-viewer" style="max-height:250px;overflow-y:auto;font-size:0.75rem;color:#8b949e;border:1px solid #21262d;border-radius:6px;padding:6px;background:#0d1117"></div>

<div class="modal" id="agent-modal">
  <div class="modal-box" style="max-width:600px;max-height:80vh;overflow-y:auto">
    <h3 id="agent-detail-title">Agent</h3>
    <div id="agent-detail-stats"></div>
    <h3 style="margin-top:12px">Recent Work</h3>
    <div id="agent-detail-digests" style="font-size:0.8rem;color:#8b949e"></div>
    <div class="actions" style="margin-top:12px">
      <button onclick="closeModal('agent-modal')">Close</button>
      <button class="primary" id="agent-detail-wake">Wake Now</button>
    </div>
  </div>
</div>

<div class="modal" id="group-detail-modal">
  <div class="modal-box" style="max-width:700px;max-height:80vh;overflow-y:auto">
    <h3 id="group-detail-title">Group</h3>
    <div id="group-detail-stats"></div>
    <h3 style="margin-top:12px">Members</h3>
    <div id="group-detail-members" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px"></div>
    <h3 style="margin-top:12px">Recent Meetings</h3>
    <div id="group-detail-meetings" style="font-size:0.8rem;color:#8b949e"></div>
    <div class="actions" style="margin-top:12px">
      <button onclick="closeModal('group-detail-modal')">Close</button>
      <button onclick="conveneFromDetail('operational')">Operational</button>
      <button onclick="conveneFromDetail('governance')" style="background:#238636;border-color:#238636;color:#c9d1d9">Governance</button>
      <button onclick="conveneFromDetail('retrospective')">Retrospective</button>
    </div>
  </div>
</div>

<div class="modal" id="convene-gov-modal">
  <div class="modal-box">
    <h3>Convene Governance Meeting</h3>
    <div id="convene-gov-topic" style="font-size:0.8rem;color:#8b949e;margin-bottom:10px"></div>
    <label style="font-size:0.8rem;color:#8b949e">Group to convene:</label>
    <select id="convene-gov-group" style="width:100%;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:8px;margin-bottom:10px;font-family:inherit"></select>
    <div class="actions">
      <button onclick="closeModal('convene-gov-modal')">Cancel</button>
      <button class="primary" onclick="confirmConveneGovernance()">Convene</button>
    </div>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// Auth + security helpers (Phase B: v0.5.0 security review C1)
// ---------------------------------------------------------------------------

// Read the per-daemon auth token from the URL on first load and persist it
// for subsequent fetches. The operator opens `/dashboard?token=<value>` once;
// the token survives navigation within the SPA. Without a token every API
// call gets a 401 from the server.
(function () {
  var urlParams = new URLSearchParams(window.location.search);
  var t = urlParams.get('token');
  if (t) {
    try { sessionStorage.setItem('murmurationToken', t); } catch (_) { /* storage disabled */ }
  }
})();

function getToken() {
  try { return sessionStorage.getItem('murmurationToken') || ''; }
  catch (_) { return ''; }
}

// Escape an untrusted string for safe interpolation inside HTML text content
// or double-quoted attribute values. Use for anything coming from GitHub
// (topic, title, labels, body), LLM output (digest content), or user input.
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Only permit http:, https:, and mailto: schemes in user-supplied URLs.
// Rejects javascript:, data:, file:, etc. If the URL is invalid or uses a
// non-allowlisted scheme, returns '#'.
function safeUrl(u) {
  if (typeof u !== 'string') return '#';
  try {
    var parsed = new URL(u, window.location.origin);
    if (parsed.protocol === 'http:' || parsed.protocol === 'https:' || parsed.protocol === 'mailto:') {
      return parsed.href;
    }
  } catch (_) { /* fallthrough */ }
  return '#';
}

// All data-fetching routes through this so the auth token is always included.
function apiFetch(path, init) {
  var opts = init || {};
  var headers = Object.assign({}, opts.headers || {});
  var tok = getToken();
  if (tok) headers['X-Murmuration-Token'] = tok;
  return fetch(path, Object.assign({}, opts, { headers: headers }));
}

// SSE needs the token in the query string since EventSource can't set headers.
function apiEventSource(path) {
  var tok = getToken();
  var sep = path.indexOf('?') >= 0 ? '&' : '?';
  return new EventSource(tok ? path + sep + 'token=' + encodeURIComponent(tok) : path);
}

var lastStatusData = null;
async function refresh() {
  try {
    const r = await apiFetch('/api/status');
    const d = await r.json();
    lastStatusData = d;
    const m = d.murmuration || {};
    document.getElementById('title').textContent = (d.name || 'Murmuration') + ' Dashboard';
    document.title = (d.name || 'Murmuration') + ' Dashboard';
    const ghLink = d.githubUrl ? ' | <a href="' + esc(safeUrl(d.githubUrl + '/issues')) + '" style="color:#58a6ff" target="_blank" rel="noopener">GitHub Issues</a>' : '';
    const g = d.governance || {};
    const govName = g.model || 'none';
    const govMeta = govName !== 'none' ? ' | Governance: ' + govName : '';
    document.getElementById('meta').innerHTML = 'v' + esc(d.version) + ' | PID ' + esc(d.pid) + esc(govMeta) + ' | ' + new Date().toLocaleTimeString() + ghLink;

    // 1. Overview
    const idleRate = m.totalWakes > 0 ? Math.round((m.idleWakes / m.totalWakes) * 100) : 0;
    document.getElementById('overview').innerHTML =
      sc(d.agentCount, 'Agents') +
      sc(m.groupCount || 0, 'Groups') +
      sc(m.totalWakes || 0, 'Total Wakes') +
      sc(m.totalArtifacts || 0, 'Artifacts') +
      sc(idleRate + '%', 'Idle Rate') +
      sc(g.totalItems || 0, 'Gov Items');

    // 2. Groups
    document.getElementById('groups').innerHTML = (d.groups || []).map(g => {
      const gIdle = g.totalWakes > 0 ? Math.round((g.idleWakes / g.totalWakes) * 100) : 0;
      return '<div class="group-card"><h3><a href="#" data-group-id="' + esc(g.groupId) + '" onclick="showGroup(this.dataset.groupId);return false" style="color:#58a6ff;text-decoration:none">' + esc(g.groupId) + '</a></h3>' +
        '<div class="group-stats">' +
        esc(g.memberCount) + ' members | ' +
        '<span>' + esc(g.totalWakes) + '</span> wakes | ' +
        '<span>' + esc(g.totalArtifacts) + '</span> artifacts | ' +
        esc(gIdle) + '% idle' +
        '</div>' +
        '<div class="group-members">' +
        g.members.map(id => {
          const a = d.agents.find(x => x.agentId === id);
          const cls = a && a.totalArtifacts > 0 ? 'active' : a && a.totalWakes > 0 ? 'idle' : '';
          return '<span class="member-tag ' + esc(cls) + '">' + esc(id) + '</span>';
        }).join('') +
        '</div></div>';
    }).join('');

    // 2b. Governance
    const gt = g.terminology || {};
    const itemLabel = gt.governanceItem || 'item';
    const eventLabel = gt.governanceEvent || 'event';
    document.getElementById('gov-title').textContent = 'Governance' + (govName !== 'none' ? ' (' + govName + ')' : '');
    const pending = g.pending || [];
    const recent = g.recentDecisions || [];
    let govHtml = '';
    const ghBase = d.githubUrl || '';
    const ghIssuesUrl = ghBase ? ghBase + '/issues' : '';
    if (pending.length > 0) {
      govHtml += '<div class="group-card"><h3>Pending ' + itemLabel + 's (' + pending.length + ')</h3>';
      govHtml += pending.map(i => {
        var label = '[' + esc(i.kind) + '] ' + esc((i.topic || '(no topic)').slice(0, 60));
        var topicSearch = (i.topic || '').slice(0, 40).replace(/[^\w\s]/g, '').trim().split(/\s+/).slice(0, 4).join('+');
        var itemUrl = i.githubIssueUrl || (ghIssuesUrl ? ghIssuesUrl + '?q=is:issue+%5B' + encodeURIComponent(String(i.kind).toUpperCase()) + '%5D+' + encodeURIComponent(topicSearch) : '');
        var link = itemUrl ? '<a href="' + esc(safeUrl(itemUrl)) + '" style="color:#8b949e" target="_blank" rel="noopener">' + label + '</a>' : label;

        // Only show meeting state for items that were specifically convened
        var cState = convenedItems[i.id];
        var stateText, stateColor, btnHtml;
        if (cState === 'done') {
          var mUrl = meetingMinutesUrl[Object.keys(meetingMinutesUrl)[0] || ''] || (ghIssuesUrl ? ghIssuesUrl + '?q=is:issue+%5BGOVERNANCE+MEETING%5D+in:title+sort:created-desc' : '');
          stateText = mUrl ? '<a href="' + esc(safeUrl(mUrl)) + '" target="_blank" rel="noopener" style="color:#3fb950">meeting complete — view minutes</a>' : '<span style="color:#3fb950">meeting complete</span>';
          stateColor = '#3fb950';
          btnHtml = '';
        } else if (cState) {
          stateText = esc(convenedLabel(cState));
          stateColor = '#d29922';
          btnHtml = '';
        } else {
          stateText = esc(i.state);
          stateColor = '';
          btnHtml = '<button data-convene="' + esc(i.id) + '" data-kind="' + esc(i.kind) + '" data-topic="' + esc(i.topic || '') + '" data-createdby="' + esc(i.createdBy || '') + '" onclick="conveneGovernance(this)" style="font-size:0.65rem;padding:2px 6px;background:#238636;color:#c9d1d9;border:1px solid #238636;border-radius:4px;cursor:pointer">Convene</button>';
        }
        return '<div class="stat" style="align-items:center"><span class="label">' + link + '</span><span style="display:flex;gap:6px;align-items:center"><span class="value" id="gov-state-' + esc(i.id) + '"' + (stateColor ? ' style="color:' + stateColor + '"' : '') + '>' + stateText + '</span>' + btnHtml + '</span></div>';
      }).join('');
      govHtml += '</div>';
    }
    if (recent.length > 0) {
      govHtml += '<div class="group-card"><h3>Recent Decisions</h3>';
      govHtml += recent.map(i => {
        var label = '[' + esc(i.kind) + '] ' + esc((i.topic || '(no topic)').slice(0, 60));
        var topicSearch = (i.topic || '').slice(0, 40).replace(/[^\w\s]/g, '').trim().split(/\s+/).slice(0, 4).join('+');
        var issueUrl = i.githubIssueUrl || (ghIssuesUrl ? ghIssuesUrl + '?q=is:issue+%5B' + encodeURIComponent(String(i.kind).toUpperCase()) + '%5D+' + encodeURIComponent(topicSearch) : '');
        var labelLink = issueUrl ? '<a href="' + esc(safeUrl(issueUrl)) + '" style="color:#8b949e" target="_blank" rel="noopener">' + label + '</a>' : label;
        var stateLink = issueUrl ? '<a href="' + esc(safeUrl(issueUrl)) + '" style="color:#3fb950" target="_blank" rel="noopener">' + esc(i.state) + '</a>' : esc(i.state);
        return '<div class="stat"><span class="label">' + labelLink + '</span><span class="value state-idle">' + stateLink + '</span></div>';
      }).join('');
      govHtml += '</div>';
    }
    if (govHtml === '') {
      govHtml = '<div class="group-card"><h3>No governance items</h3><div class="stat"><span class="label">File a ' + esc(eventLabel) + ' to start governance</span><span class="value">—</span></div></div>';
    }
    document.getElementById('governance').innerHTML = govHtml;

    // 2c. Recent Meetings — compact list, max 5 (GitHub is the source of truth)
    var meetingsData = (d.recentMeetings || []).slice(0, 5);
    var allMeetingsUrl = ghBase ? ghBase + '/issues?q=is:issue+label:group-meeting,governance-meeting+sort:created-desc' : '';
    var meetingsHtml = '';
    if (meetingsData.length > 0) {
      meetingsHtml = '<div class="group-card" style="padding:10px 14px">';
      meetingsHtml += meetingsData.map(function(m) {
        var kindColors = { governance: '#d29922', retrospective: '#f85149', operational: '#3fb950' };
        var kc = kindColors[m.kind] || '#8b949e';
        var rawLabel = m.title ? String(m.title).replace(/^\[.*?\]\s*/, '').slice(0, 70) : m.groupId;
        var label = esc(rawLabel);
        var titleHtml = m.minutesUrl
          ? '<a href="' + esc(safeUrl(m.minutesUrl)) + '" target="_blank" rel="noopener" style="color:#c9d1d9;text-decoration:none">' + label + '</a>'
          : '<span style="color:#c9d1d9">' + label + '</span>';
        var statusHtml = m.status === 'running'
          ? '<span style="color:#d29922">in progress</span>'
          : '';
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #21262d;font-size:0.8rem">' +
          '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + titleHtml + '</span>' +
          '<span style="display:flex;gap:8px;align-items:center;flex-shrink:0;margin-left:12px">' +
          '<span style="color:' + kc + ';font-size:0.7rem">' + esc(m.kind) + '</span>' +
          '<span style="color:#8b949e;font-size:0.7rem">' + esc(m.date) + '</span>' +
          statusHtml + '</span></div>';
      }).join('');
      if (allMeetingsUrl) {
        meetingsHtml += '<div style="text-align:right;padding-top:6px"><a href="' + esc(safeUrl(allMeetingsUrl)) + '" target="_blank" rel="noopener" style="color:#58a6ff;font-size:0.7rem">all meetings in GitHub &rarr;</a></div>';
      }
      meetingsHtml += '</div>';
    } else if (allMeetingsUrl) {
      meetingsHtml = '<div class="group-card" style="padding:10px 14px"><div style="display:flex;justify-content:space-between;align-items:center;font-size:0.8rem"><span style="color:#8b949e">No meetings this session</span><a href="' + esc(safeUrl(allMeetingsUrl)) + '" target="_blank" rel="noopener" style="color:#58a6ff;font-size:0.7rem">view in GitHub &rarr;</a></div></div>';
    }
    document.getElementById('meetings').innerHTML = meetingsHtml;

    // Update dropdowns with current data
    updateDropdowns(d);

    // 3. Agents — sort and filter
    var sortBy = sessionStorage.getItem('agentSort') || 'name';
    var filterBy = sessionStorage.getItem('agentFilter') || 'all';
    // Restore dropdown selections
    var sortEl = document.getElementById('agent-sort');
    if (sortEl) sortEl.value = sortBy;
    // Update filter dropdown with group options
    var filterEl = document.getElementById('agent-filter');
    if (filterEl) {
      var currentFilter = filterEl.value;
      filterEl.innerHTML = '<option value="all">Filter: All</option><option value="idle">Idle</option><option value="running">Running</option><option value="failed">Failed</option>' +
        (d.groups || []).map(function(g) { return '<option value="group:' + g.groupId + '">Group: ' + g.groupId + '</option>'; }).join('');
      filterEl.value = currentFilter || filterBy;
    }
    var filteredAgents = d.agents.filter(function(a) {
      if (filterBy === 'all') return true;
      if (filterBy === 'idle' || filterBy === 'running' || filterBy === 'failed') return a.state === filterBy;
      if (filterBy.startsWith('group:')) return (a.groups || []).indexOf(filterBy.slice(6)) >= 0;
      return true;
    });
    filteredAgents.sort(function(a, b) {
      if (sortBy === 'wakes') return b.totalWakes - a.totalWakes;
      if (sortBy === 'artifacts') return b.totalArtifacts - a.totalArtifacts;
      if (sortBy === 'idle') {
        var ai = a.totalWakes > 0 ? a.idleWakes / a.totalWakes : 0;
        var bi = b.totalWakes > 0 ? b.idleWakes / b.totalWakes : 0;
        return bi - ai;
      }
      if (sortBy === 'failures') return b.consecutiveFailures - a.consecutiveFailures;
      return a.agentId.localeCompare(b.agentId);
    });
    document.getElementById('agents').innerHTML = filteredAgents.map(a => {
      var ir = a.totalWakes > 0 ? Math.round((a.idleWakes / a.totalWakes) * 100) : 0;
      var ar = a.totalWakes > 0 ? (a.totalArtifacts / a.totalWakes).toFixed(1) : '0';
      var sc2 = a.state === 'idle' ? 'state-idle' : a.state === 'running' ? 'state-running' : 'state-failed';
      var agentIdE = esc(a.agentId);
      return '<div class="card"><h3><a href="#" data-agent-id="' + agentIdE + '" onclick="showAgent(this.dataset.agentId);return false" style="color:#58a6ff;text-decoration:none">' + agentIdE + '</a></h3>' +
        st('State', '<span class="' + sc2 + '">' + esc(a.state) + '</span>') +
        st('Wakes', a.totalWakes) + st('Artifacts', a.totalArtifacts) +
        st('Art/Wake', ar) + st('Idle', ir + '%') + st('Failures', a.consecutiveFailures) +
        '<div class="bar"><div class="bar-fill' + (ir > 50 ? ' warn' : '') +
        '" style="width:' + Math.max(5, (a.totalArtifacts / Math.max(a.totalWakes, 1)) * 100) + '%"></div></div>' +
        '<div style="margin-top:8px"><button data-wake="' + agentIdE + '" onclick="wakeNow(this.dataset.wake)" style="font-size:0.75rem;padding:3px 8px;background:#21262d;color:#58a6ff;border:1px solid #30363d;border-radius:4px;cursor:pointer">Wake Now</button></div></div>';
    }).join('');
  } catch (e) {
    document.getElementById('meta').textContent = 'Disconnected: ' + e.message;
    document.getElementById('dot').style.background = '#f85149';
  }
}
function sc(n, l) { return '<div class="stat-card"><div class="num">' + n + '</div><div class="lbl">' + l + '</div></div>'; }
function st(l, v) { return '<div class="stat"><span class="label">' + l + '</span><span class="value">' + v + '</span></div>'; }

const sse = apiEventSource('/api/events');
sse.onmessage = function(e) {
  var div = document.createElement('div');
  div.textContent = new Date().toLocaleTimeString() + ' ' + e.data;
  document.getElementById('events').prepend(div);
  refresh();
};
sse.addEventListener('connected', function() { document.getElementById('dot').style.background = '#3fb950'; });
sse.onerror = function() { document.getElementById('dot').style.background = '#f85149'; };

// Typed SSE event handlers — events over polling (Engineering Standard #4)
sse.addEventListener('wake.completed', function(e) {
  var data = JSON.parse(e.data);
  logEvent('Agent ' + data.agentId + ' wake ' + data.outcome + ' (' + data.artifactCount + ' artifacts)');
  refresh();
});
sse.addEventListener('meeting.started', function(e) {
  var data = JSON.parse(e.data);
  logEvent('Meeting started: ' + data.groupId + ' (' + data.meetingKind + ')');
  // Update any convened governance items to show "meeting in progress"
  meetingState[data.groupId] = 'running';
  refresh();
});
sse.addEventListener('meeting.completed', function(e) {
  var data = JSON.parse(e.data);
  logEvent('Meeting completed: ' + data.groupId + (data.minutesUrl ? ' — ' + data.minutesUrl : ''));
  meetingState[data.groupId] = 'completed';
  meetingMinutesUrl[data.groupId] = data.minutesUrl || '';
  // Clear convened items that were resolved
  (data.transitions || []).forEach(function(t) { convenedItems[t.itemId] = 'done'; });
  refresh();
});
sse.addEventListener('governance.transitioned', function(e) {
  var data = JSON.parse(e.data);
  logEvent('Governance: ' + data.itemId.slice(0,8) + ' ' + data.from + ' → ' + data.to);
  refresh();
});

// Log viewer — captures SSE log.entry events + domain events
var logEntries = [];
var logFilter = 'info';
var LOG_LEVELS = { debug: 0, info: 1, warn: 2, error: 3 };
var LOG_COLORS = { debug: '#8b949e', info: '#58a6ff', warn: '#d29922', error: '#f85149' };

function logEvent(msg) {
  logEntries.unshift({ ts: new Date().toLocaleTimeString(), level: 'info', text: msg });
  if (logEntries.length > 200) logEntries.pop();
  renderLog();
}

sse.addEventListener('log.entry', function(e) {
  var data = JSON.parse(e.data);
  logEntries.unshift({ ts: data.ts ? data.ts.slice(11, 19) : new Date().toLocaleTimeString(), level: data.level || 'info', text: data.event + (Object.keys(data.data || {}).length > 0 ? ' ' + JSON.stringify(data.data).slice(0, 100) : '') });
  if (logEntries.length > 200) logEntries.pop();
  renderLog();
});

function renderLog() {
  var minLevel = LOG_LEVELS[logFilter] || 1;
  var filtered = logEntries.filter(function(e) { return (LOG_LEVELS[e.level] || 0) >= minLevel; });
  var viewer = document.getElementById('log-viewer');
  if (!viewer) return;
  viewer.innerHTML = filtered.slice(0, 50).map(function(e) {
    var c = LOG_COLORS[e.level] || '#8b949e';
    return '<div style="padding:1px 0;border-bottom:1px solid #21262d"><span style="color:#8b949e">' + esc(e.ts) + '</span> <span style="color:' + c + ';font-weight:600">' + esc(e.level) + '</span> ' + esc(e.text) + '</div>';
  }).join('');
}

function setLogFilter(level) {
  logFilter = level;
  var btns = document.querySelectorAll('#log-level-btns button');
  btns.forEach(function(btn) {
    if (btn.getAttribute('data-level') === level) {
      btn.style.background = '#30363d';
      btn.style.color = LOG_COLORS[level] || '#58a6ff';
    } else {
      btn.style.background = '#21262d';
      btn.style.color = '#8b949e';
    }
  });
  renderLog();
}

refresh();
setInterval(refresh, 10000); // heartbeat fallback

// Toolbar actions
function showDirective() { document.getElementById('directive-modal').classList.add('show'); }
function showGroupWake(gid) {
  document.getElementById('gw-group').textContent = gid;
  document.getElementById('group-modal').classList.add('show');
  document.getElementById('group-select').value = '';
}
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

async function sendCmd(method, params) {
  try {
    const r = await apiFetch('/api/command', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ method, params })
    });
    const d = await r.json();
    if (!d.ok) console.error(method + ' failed:', d.error);
    refresh();
    return d;
  } catch(e) { console.error('Command failed:', e.message); return { ok: false }; }
}

function sendDirective() {
  const sel = document.getElementById('dir-scope');
  const opt = sel.options[sel.selectedIndex];
  const scope = opt.dataset.scope || '--all';
  const target = opt.dataset.target || '';
  const message = document.getElementById('dir-message').value;
  if (!message.trim()) return;
  closeModal('directive-modal');
  sendCmd('directive', { scope, target, message });
  document.getElementById('dir-message').value = '';
}

function sendGroupWake() {
  const groupId = document.getElementById('gw-group').textContent;
  const kind = document.getElementById('gw-kind').value;
  const directive = document.getElementById('gw-directive').value || undefined;
  closeModal('group-modal');
  sendCmd('group-wake', { groupId, kind, ...(directive ? {directive} : {}) });
  document.getElementById('gw-directive').value = '';
}

async function showAgent(agentId) {
  try {
    if (!/^[a-z0-9][a-z0-9._-]*$/i.test(String(agentId))) return;
    const r = await apiFetch('/api/agent/' + encodeURIComponent(agentId));
    const d = await r.json();
    document.getElementById('agent-detail-title').textContent = d.agentId;
    document.getElementById('agent-detail-stats').innerHTML =
      st('State', esc(d.state)) + st('Wakes', d.totalWakes) + st('Artifacts', d.totalArtifacts) +
      st('Idle Wakes', d.idleWakes) + st('Failures', d.consecutiveFailures);
    const digests = (d.recentDigests || []).map(function(dig) {
      return '<div style="margin:8px 0;padding:8px;background:#0d1117;border:1px solid #21262d;border-radius:6px"><strong>' + esc(dig.date) + '</strong><pre style="white-space:pre-wrap;margin:4px 0 0;font-size:0.75rem;color:#c9d1d9">' + linkify(esc(dig.summary)) + '</pre></div>';
    }).join('');
    document.getElementById('agent-detail-digests').innerHTML = digests || '<div style="color:#8b949e">No digests yet</div>';
    document.getElementById('agent-detail-wake').onclick = function() { closeModal('agent-modal'); wakeNow(agentId); };
    document.getElementById('agent-modal').classList.add('show');
  } catch(e) { alert('Failed to load agent: ' + e.message); }
}

function wakeNow(agentId) {
  const btn = document.querySelector('[data-wake="' + agentId + '"]');
  if (btn) { btn.textContent = 'Waking...'; btn.disabled = true; }
  sendCmd('wake-now', { agentId }).then(function() {
    if (btn) { btn.textContent = 'Woken'; setTimeout(function() { btn.textContent = 'Wake Now'; btn.disabled = false; }, 5000); }
  });
}

// Populate group dropdown + directive scope on data load
function updateDropdowns(d) {
  const gs = document.getElementById('group-select');
  gs.innerHTML = '<option value="">Convene Group...</option>' +
    (d.groups || []).map(g => '<option value="' + esc(g.groupId) + '">' + esc(g.groupId) + '</option>').join('');
  const ds = document.getElementById('dir-scope');
  ds.innerHTML = '<option data-scope="--all">All Agents</option>' +
    (d.groups || []).map(g => '<option data-scope="--group" data-target="' + esc(g.groupId) + '">Group: ' + esc(g.groupId) + '</option>').join('') +
    d.agents.map(a => '<option data-scope="--agent" data-target="' + esc(a.agentId) + '">Agent: ' + esc(a.agentId) + '</option>').join('');
}

// Track convened governance items so refresh doesn't reset their visual state
var convenedItems = {};
// Track in-flight meeting state (populated by SSE events)
var meetingState = {};
var meetingMinutesUrl = {};

// Linkify URLs in already-escaped text. Input must be HTML-escaped before
// this is called — we match the escaped form (e.g. `&lt;` won't break out).
// Output href is re-validated through safeUrl to reject anything that isn't
// http/https, even though the match already only accepts http(s) prefixes.
function linkify(text) {
  return text.replace(/(https?:\/\/[^\s<)"']+)/g, function(match) {
    var href = safeUrl(match);
    if (href === '#') return match;
    return '<a href="' + esc(href) + '" target="_blank" rel="noopener" style="color:#58a6ff">' + match + '</a>';
  });
}

// Group detail modal
let currentGroupId = '';
async function showGroup(groupId) {
  if (!/^[a-z0-9][a-z0-9._-]*$/i.test(String(groupId))) return;
  currentGroupId = groupId;
  try {
    const r = await apiFetch('/api/group/' + encodeURIComponent(groupId));
    const d = await r.json();
    document.getElementById('group-detail-title').textContent = d.groupId;
    document.getElementById('group-detail-stats').innerHTML =
      st('Members', d.memberCount) + st('Wakes', d.totalWakes) + st('Artifacts', d.totalArtifacts) + st('Idle Rate', d.idleRate + '%');
    document.getElementById('group-detail-members').innerHTML =
      (d.members || []).map(function(m) {
        const cls = m.totalArtifacts > 0 ? 'active' : m.totalWakes > 0 ? 'idle' : '';
        return '<span class="member-tag ' + esc(cls) + '">' + esc(m.agentId) + '</span>';
      }).join('');
    const meetings = (d.recentMeetings || []).map(function(mtg) {
      return '<div style="margin:8px 0;padding:8px;background:#0d1117;border:1px solid #21262d;border-radius:6px">' +
        '<strong>' + esc(mtg.date) + '</strong> <span style="color:#8b949e;font-size:0.7rem">' + esc(mtg.kind) + '</span>' +
        '<pre style="white-space:pre-wrap;margin:4px 0 0;font-size:0.75rem;color:#c9d1d9">' + linkify(esc(mtg.summary)) + '</pre></div>';
    }).join('');
    document.getElementById('group-detail-meetings').innerHTML = meetings || '<div style="color:#8b949e">No meetings yet</div>';
    document.getElementById('group-detail-modal').classList.add('show');
  } catch(e) { console.error('Failed to load group:', e.message); }
}

function conveneFromDetail(kind) {
  if (!currentGroupId) return;
  closeModal('group-detail-modal');
  sendCmd('group-wake', { groupId: currentGroupId, kind: kind });
}

// Convene governance meeting — show group picker modal
var pendingConvene = null; // { itemId, kind, topic, createdBy }
function conveneGovernance(btn) {
  var itemId = btn.getAttribute('data-convene');
  var kind = btn.getAttribute('data-kind');
  var topic = btn.getAttribute('data-topic');
  var createdBy = btn.getAttribute('data-createdby') || '';
  pendingConvene = { itemId: itemId, kind: kind, topic: topic, createdBy: createdBy };

  // Populate group picker, default to the filing agent's group
  var gs = document.getElementById('convene-gov-group');
  var allGroups = document.getElementById('group-select');
  gs.innerHTML = '';
  for (var i = 1; i < allGroups.options.length; i++) {
    var opt = document.createElement('option');
    opt.value = allGroups.options[i].value;
    opt.textContent = allGroups.options[i].value;
    gs.appendChild(opt);
  }

  // Find which group the filing agent belongs to and default-select it
  if (createdBy && lastStatusData) {
    var agent = (lastStatusData.agents || []).find(function(a) { return a.agentId === createdBy; });
    if (agent && agent.groups && agent.groups.length > 0) {
      gs.value = agent.groups[0];
    }
  }

  document.getElementById('convene-gov-topic').textContent = '[' + kind + '] ' + (topic || '').slice(0, 100);
  document.getElementById('convene-gov-modal').classList.add('show');
}

function confirmConveneGovernance() {
  if (!pendingConvene) return;
  var groupId = document.getElementById('convene-gov-group').value;
  if (!groupId) return;
  var pc = pendingConvene;
  pendingConvene = null;
  closeModal('convene-gov-modal');

  // Mark convened
  convenedItems[pc.itemId] = 'convening';
  var stateEl = document.getElementById('gov-state-' + pc.itemId);
  if (stateEl) { stateEl.textContent = 'convening...'; stateEl.style.color = '#d29922'; }
  // Remove the button
  var btn = document.querySelector('[data-convene="' + pc.itemId + '"]');
  if (btn) btn.remove();

  sendCmd('group-wake', { groupId: groupId, kind: 'governance', directive: 'Resolve pending ' + pc.kind + ': ' + pc.topic }).then(function() {
    convenedItems[pc.itemId] = 'in-progress';
    var el = document.getElementById('gov-state-' + pc.itemId);
    if (el) { el.textContent = 'meeting in progress...'; }
  });
}

// Map convened state to display text
function convenedLabel(state) {
  if (state === 'convening') return 'convening...';
  if (state === 'in-progress') return 'meeting in progress...';
  if (state === 'done') return 'meeting complete';
  return 'convened';
}

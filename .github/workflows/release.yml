name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # gh release create
  id-token: write # npm Trusted Publishing (OIDC exchange at registry.npmjs.org)

jobs:
  publish:
    name: verify + publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Install pnpm
        # OIDC Trusted Publishing requires the NATIVE pnpm publish flow: pnpm
        # 10.x delegated `pnpm publish` to the npm CLI and never performed the
        # OIDC token exchange itself (10.33.0 fails with ENEEDAUTH). pnpm 11.0
        # made publish native, 11.0.7 added OIDC precedence over a static
        # token, and 11.1.3 fixed the setup-node empty-token E404. Pin 11.5.3
        # (>= the 11.1.3 floor). Keep this in lockstep with package.json
        # `packageManager` and ci.yml.
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: pnpm
          # NOTE: deliberately NO `registry-url:` here. setup-node's
          # registry-url writes an .npmrc line
          # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` and exports
          # an (empty, since we keep no NPM_TOKEN secret) NODE_AUTH_TOKEN.
          # That empty token shadows OIDC Trusted Publishing: npm sends an
          # empty bearer instead of performing the OIDC exchange, and the
          # registry rejects the PUT with E404 (this broke the first OIDC
          # release, v0.9.0). pnpm publishes to the default npmjs.org
          # registry and performs the OIDC exchange itself when `id-token:
          # write` is granted and no token is configured — so the registry
          # must NOT be pre-wired with an auth token here.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package versions match tag
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.7.1
          VERSION="${TAG#v}"                 # strip leading v
          echo "Tag: $TAG  →  expected version: $VERSION"

          MISMATCHES=0
          for pkg in packages/*/package.json package.json; do
            PKG_VERSION=$(node -p "require('./$pkg').version" 2>/dev/null || true)
            if [ -z "$PKG_VERSION" ]; then continue; fi
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "MISMATCH: $pkg has version $PKG_VERSION, expected $VERSION"
              MISMATCHES=$((MISMATCHES + 1))
            fi
          done
          if [ "$MISMATCHES" -gt 0 ]; then
            echo "Version check failed — bump all package.json files to $VERSION before tagging."
            exit 1
          fi
          echo "All package.json versions match $VERSION ✓"

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Publish to npm (Trusted Publishing via OIDC)
        # No NODE_AUTH_TOKEN: pnpm exchanges the GitHub OIDC token for a
        # short-lived npm publish token via the configured trusted publisher
        # for each @murmurations-ai/* package. The trusted publisher
        # binding lives in each package's npmjs.com Settings → Publishing
        # access tab and must name this repo + this workflow + this branch.
        # If npm errors with "no trusted publisher configured", finish the
        # setup at https://www.npmjs.com/package/@murmurations-ai/<pkg>/access
        # before re-running this workflow.
        run: pnpm -r publish --access public --no-git-checks --provenance

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          # Find the previous tag to generate a changelog range
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --oneline "${PREV_TAG}..${TAG}" 2>/dev/null || true)
          else
            NOTES=$(git log --oneline "${TAG}" 2>/dev/null || true)
          fi

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists — skipping creation."
          else
            echo "$NOTES" | gh release create "$TAG" \
              --title "Release $TAG" \
              --notes-file - \
              --verify-tag
          fi
